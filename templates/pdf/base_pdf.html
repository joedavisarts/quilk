<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;600;700&display=swap');

  @page { margin: 0; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 10pt;
    color: #0E0E0E;
    background: #FFFFFF;
    padding: 0;
  }

  .page {
    width: 100%;
    padding: 36pt 42pt;
  }

  /* Header */
  .doc-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4pt;
  }
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .logo-block img {
    height: 56pt;
    width: auto;
  }
  .logo-wordmark {
    color: #77600B;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-align: left;
    margin-top: 4pt;
  }
  .logo-placeholder {
    font-size: 13pt;
    font-weight: 700;
    color: #DAB322;
    letter-spacing: 1px;
  }
  .header-right {
    text-align: right;
    font-size: 8.5pt;
    color: #444;
    line-height: 1.5;
  }
  .header-right .doc-number {
    font-size: 14pt;
    font-weight: 700;
    color: #0E0E0E;
    margin-bottom: 4pt;
  }
  .header-right .doc-type-label {
    font-size: 27pt;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #77600B;
  }

  /* Gold rule */
  .gold-rule {
    border: none;
    border-top: 2pt solid #DAB322;
    margin: 10pt 0 16pt;
  }

  /* Client block */
  .bill-to-section {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20pt;
  }
  .bill-to h3 {
    font-size: 7.5pt;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #77600B;
    margin-bottom: 4pt;
    font-weight: 600;
  }
  .bill-to p {
    line-height: 1.55;
    font-size: 9.5pt;
  }
  .doc-meta {
    text-align: right;
    font-size: 9pt;
    color: #444;
    line-height: 1.6;
  }
  .doc-meta strong { color: #0E0E0E; }

  /* Line items table */
  .items-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16pt;
  }
  .items-table thead tr {
    background: #0E0E0E;
    color: #DAB322;
  }
  .items-table thead th {
    padding: 6pt 8pt;
    text-align: left;
    font-size: 8pt;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .items-table thead th:last-child { text-align: right; }
  .items-table tbody tr:nth-child(odd) { background: #FFFCF5; }
  .items-table tbody tr:nth-child(even) { background: #FFFFFF; }
  .items-table tbody td {
    padding: 6pt 8pt;
    font-size: 9.5pt;
    vertical-align: top;
  }
  .items-table tbody td:last-child { text-align: right; }
  .items-table .desc-col { width: 50%; }
  .items-table .qty-col { width: 12%; }
  .items-table .price-col { width: 18%; text-align: right; }
  .items-table .total-col { width: 18%; }

  /* Totals block */
  .totals-block {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 20pt;
  }
  .totals-inner {
    width: 220pt;
  }
  .totals-inner .t-row {
    display: flex;
    justify-content: space-between;
    padding: 3pt 0;
    font-size: 9.5pt;
    border-bottom: 0.5pt solid #e8e4dc;
    color: #333;
  }
  .totals-inner .t-row.t-due {
    margin-top: 4pt;
    border-bottom: none;
    border-top: 1.5pt solid #DAB322;
    padding-top: 6pt;
    font-size: 12pt;
    font-weight: 700;
    color: #0E0E0E;
  }

  /* Pay by date */
  .pay-by {
    margin-bottom: 16pt;
    padding: 8pt 12pt;
    background: #FFFCF5;
    border-left: 3pt solid #DAB322;
    font-size: 9.5pt;
  }
  .pay-by strong { color: #77600B; }
  .pay-by .pay-by-date { color: #0E0E0E; font-weight: 700; }

  /* Payment methods */
  .payment-section {
    margin-top: 20pt;
    margin-bottom: 20pt;
  }
  .payment-section h3 {
    font-size: 18pt;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #77600B;
    font-weight: 700;
    margin-bottom: 12pt;
    padding-bottom: 6pt;
    border-bottom: 1pt solid #e8e4dc;
  }
  .payment-group-label {
    font-size: 11pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #77600B;
    margin-bottom: 3pt;
  }
  .payment-group-rule {
    border: none;
    border-top: 0.75pt solid #77600B;
    margin-bottom: 8pt;
  }
  .payment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8pt 20pt;
    margin-bottom: 6pt;
  }
  .payment-item h4 {
    font-size: 10pt;
    font-weight: 600;
    color: #0E0E0E;
    margin-bottom: 2pt;
  }
  .payment-item p {
    font-size: 8.5pt;
    line-height: 1.5;
    color: #333;
  }

  /* Footer */
  .doc-footer {
    border-top: 0.5pt solid #e0dcd4;
    padding-top: 8pt;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 8pt;
    color: #666;
  }
  .doc-footer .thank-you {
    font-weight: 600;
    color: #77600B;
    font-size: 8.5pt;
  }
  .quote-valid {
    font-size: 8pt;
    color: #555;
    font-style: italic;
    margin-bottom: 8pt;
  }
</style>
</head>
<body>
