<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Quilk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-logo img { width: 36px; height: 36px; }
    .login-logo span { font-size: 15px; font-weight: 700; letter-spacing: 0.12em; color: var(--text); }
    .login-card h2 { margin: 0 0 24px; font-size: 18px; font-weight: 600; color: var(--text); }
    .login-card .field { margin-bottom: 16px; }
    .login-card .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
    .login-card .field input {
      width: 100%;
      box-sizing: border-box;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
    }
    .login-card .field input:focus { outline: none; border-color: var(--gold); }
    .login-error {
      background: rgba(192,57,43,0.12);
      color: #e07070;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='assets/pnglogo.png') }}" alt="Logo" />
      <span>LEDGER</span>
    </div>
    <h2>Sign in</h2>
    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-gold btn-login">Sign In</button>
    </form>
  </div>
</body>
</html>
